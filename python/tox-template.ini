# Standard tox environments for Charm Tech Python projects.
#
# These match the lint/format/static/unit environments used across our repos.
# Copy into tox.ini and adjust paths as needed. Assumes uv for dependency
# management and a `lint`, `unit`, and `static` dependency-group in pyproject.toml.
[tox]
requires =
    tox>=4.2
    tox-uv
env_list = lint, static, unit

[testenv]
runner = uv-venv-lock-runner

[testenv:format]
description = Apply coding style standards to code
dependency_groups = lint
commands = ruff format --preview

[testenv:lint]
description = Check code against coding style standards
dependency_groups = lint
commands =
    ruff check --preview
    ruff format --preview --check
    codespell {posargs}

[testenv:static]
description = Run static type checker
dependency_groups = unit, static
commands = pyright {posargs}

[testenv:unit]
description = Run unit tests
dependency_groups = unit
commands =
    coverage run --source={[vars]src_path} -m pytest {posargs} {[vars]tests_path}/unit
    coverage report

[vars]
src_path = src
tests_path = tests
