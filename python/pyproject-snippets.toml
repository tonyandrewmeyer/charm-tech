# Canonical Python tooling config for Charm Tech projects.
#
# Copy the relevant tables into your project's pyproject.toml. These reflect the
# config our repos have converged on (operator, jubilant, pytest-jubilant,
# charmhub-listing-review, charmlibs). The aim is consistency, not lock-step: a
# project can deviate where it has a good reason, but the default should be this.
#
# Decisions captured here:
#   * line-length = 99 (used everywhere)
#   * single quotes
#   * the ruff rule set below
#   * set target-version to the project's actual minimum supported Python; don't
#     leave it stale (several repos disagreed with their own requires-python).

[tool.coverage.run]
branch = true

[tool.coverage.report]
show_missing = true
# Optional, but recommended (from charmlibs):
# exclude_also = [
#     "if typing.TYPE_CHECKING:",
#     "@typing.overload",
#     "class .*\\(typing.Protocol\\):",
# ]

[tool.codespell]
skip = ".git,.tox,.venv,venv,build,dist,docs/_build,*.lock"
quiet-level = 3  # disable warnings about (1) wrong encoding and (2) binary files
check-hidden = true

[tool.pyright]
pythonVersion = "3.10"  # set to your minimum supported version
pythonPlatform = "All"
typeCheckingMode = "strict"
reportPrivateUsage = false  # things that are effectively public still need to be private to users
reportUnnecessaryTypeIgnoreComment = "error"  # unnecessary ignores should be removed
stubPath = ""  # silence warning: https://github.com/microsoft/pyright/issues/777

[tool.ruff]
line-length = 99
target-version = "py310"  # set to your minimum supported version

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
select = [
    "F",     # Pyflakes
    "E",     # Pycodestyle errors
    "W",     # Pycodestyle warnings
    "I001",  # isort
    "N",     # pep8-naming
    "A",     # flake8-builtins
    "CPY",   # flake8-copyright
    "UP",    # pyupgrade
    "YTT",   # flake8-2020
    "S",     # flake8-bandit
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # Ruff-specific
    "PERF",  # Perflint
    "D",     # pydocstyle
    "FA",    # flake8-future-annotations
    "TC",    # flake8-type-checking
]
ignore = [
    "TC001",  # Move application import into a type-checking block
    "TC002",  # Move third-party import into a type-checking block
    "TC003",  # Move standard library import into a type-checking block
    "S101",   # Use of `assert` detected
    "D105",   # Missing docstring in magic method
    "D107",   # Missing docstring in `__init__`
]

[tool.ruff.lint.per-file-ignores]
# Tests don't need docstrings, and assertions/hard-coded secrets are expected.
"tests/*" = ["D", "S101", "S105", "S106"]
"test/*" = ["D", "S101", "S105", "S106"]
