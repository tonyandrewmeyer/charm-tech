# Reusable workflow: run the zizmor GitHub Actions security scanner and upload
# SARIF results to the GitHub code-scanning dashboard.
#
# Call it from another repo (pin to a commit SHA, not @main):
#
#   jobs:
#     zizmor:
#       uses: canonical/charm-tech/.github/workflows/zizmor.yaml@<sha>
#       permissions:
#         security-events: write
#
# See templates/zizmor-caller.yaml for a complete caller workflow.
name: zizmor (reusable)

on:
  workflow_call:
    inputs:
      zizmor-version:
        description: "The zizmor version to run (a uvx version specifier)."
        type: string
        default: "v1.11.0"

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba  # v6.3.1

      - name: Run zizmor
        run: uvx zizmor@${{ inputs.zizmor-version }} --format=sarif . > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: zizmor
