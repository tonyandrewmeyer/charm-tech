# Caller for the shared zizmor reusable workflow.
# Copy to .github/workflows/zizmor.yaml in the consuming repo.
#
# Pin to a commit SHA rather than @main so a change in charm-tech can't silently
# alter this repo's CI. Update the SHA deliberately (dependabot will offer bumps
# if you keep the github-actions ecosystem in .github/dependabot.yaml).
name: Workflow static checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  zizmor:
    uses: canonical/charm-tech/.github/workflows/zizmor.yaml@REPLACE_WITH_COMMIT_SHA
    permissions:
      security-events: write
