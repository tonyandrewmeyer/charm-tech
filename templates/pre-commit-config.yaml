# Charm Tech pre-commit config for a uv-managed Python project.
# Copy to .pre-commit-config.yaml. ruff, codespell, and zizmor are defined as
# local hooks run via uv, so they use the same versions as CI and manual runs.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: mixed-line-ending
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
  - repo: local
    # See the upstream hook definitions for the origin of these:
    #   https://github.com/astral-sh/ruff-pre-commit
    #   https://github.com/zizmorcore/zizmor-pre-commit
    #   https://github.com/codespell-project/codespell
    hooks:
      - id: ruff-check
        name: ruff check
        description: "Run 'ruff check' for extremely fast Python linting"
        entry: uv run ruff check --preview --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: ruff-format
        name: ruff format
        description: "Run 'ruff format' for extremely fast Python formatting"
        entry: uv run ruff format --preview --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: zizmor
        name: zizmor
        description: "Find security issues in GitHub Actions CI/CD setups"
        language: system
        types: [yaml]
        files: (\.github/workflows/.*)|(action\.ya?ml)$
        require_serial: true
        entry: uv run zizmor
        args:
          - "--no-progress"  # https://github.com/zizmorcore/zizmor/issues/582
      - id: codespell
        name: codespell
        description: Checks for common misspellings in text files.
        entry: uv run codespell
        language: system
        types: [text]
        require_serial: true
